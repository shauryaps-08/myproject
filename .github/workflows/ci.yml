name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout myproject
        uses: actions/checkout@v4

      - name: Verify firtool
        run: firtool --version

      - name: Compile
        run: |
          cd /home/shauryaps/playground
          make compile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: /home/shauryaps/playground/out/
