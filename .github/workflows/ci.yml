name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout playground
        uses: actions/checkout@v3
        with:
          repository: morphingmachines/playground
          path: playground
          submodules: recursive

      - name: Checkout myproject
        uses: actions/checkout@v3
        with:
          path: myproject

      - uses: cachix/install-nix-action@v19
        with:
          install_url: https://releases.nixos.org/nix/nix-2.13.3/install
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install firtool
        run: |
          wget -O firtool.tar.gz https://github.com/llvm/circt/releases/download/firtool-1.62.1/circt-full-shared-linux-x64.tar.gz
          tar -xzf firtool.tar.gz
          echo "$HOME/firtool-1.62.1/bin" >> $GITHUB_PATH

      - name: Run tests
        working-directory: myproject
        run: nix develop -c make check

