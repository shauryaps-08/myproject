name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout myproject
        uses: actions/checkout@v3

      - name: Verify firtool
        run: firtool --version

      - name: Compile
        run: |
          cd /home/shauryaps/playground
          make compile

      - name: Generate RTL
        run: |
          cd /home/shauryaps/playground
          make rtl

      - name: Upload generated Verilog
        uses: actions/upload-artifact@v3
        with:
          name: generated-rtl
          path: /home/shauryaps/playground/out/**/*.sv
